name: vietidp
channels:
  - pytorch
  - nvidia
  - conda-forge
  - defaults
dependencies:
  - python=3.10
  
  # --- Core ML & GPU CUDA ---
  - pytorch
  - torchvision
  - pytorch-cuda=12.1
  
  # --- Data & Utils ---
  - numpy<2.0.0
  - pandas>=2.0.0
  - scikit-learn>=1.3.0
  - tqdm>=4.65.0
  
  # --- Image Processing ---
  - opencv
  - pillow>=10.0.0
  - scikit-image>=0.21.0
  
  # --- YOLO Detection ---
  - ultralytics>=8.0.0
  
  # --- PDF Processing ---
  - pymupdf>=1.23.0
  - python-docx>=1.0.0
  
  # --- Web API ---
  - fastapi>=0.110.0
  - uvicorn>=0.29.0
  - python-multipart>=0.0.9
  
  # --- Logging & Visualization ---
  - tensorboard>=2.15.0
  - matplotlib>=3.8.0
  
  # --- QLoRA Fine-tuning Core ---
  - transformers>=4.40.0
  - datasets>=2.18.0
  - accelerate>=0.28.0

  - pip:
    # --- OCR (PaddlePaddle GPU & PaddleOCR) ---
    - paddlepaddle-gpu>=2.6.0
    - paddleocr>=2.7.0
    
    # --- QLoRA Windows-Specific ---
    # bitsandbytes 0.43.0+ hiện tại hỗ trợ tốt Windows native
    - bitsandbytes>=0.43.0
    - peft>=0.10.0
    - trl>=0.8.0
