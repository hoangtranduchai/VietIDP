repos:
  # ── Secret/credential scanning ─────────────────────────────────
  - repo: https://github.com/Yelp/detect-secrets
    rev: v1.5.0
    hooks:
      - id: detect-secrets
        args: ["--baseline", ".secrets.baseline"]
        exclude: "package-lock.json"

  # ── Large file blocking ────────────────────────────────────────
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.6.0
    hooks:
      - id: check-added-large-files
        args: ["--maxkb=5000"]  # 5MB limit
      - id: check-merge-conflict
      - id: end-of-file-fixer
      - id: trailing-whitespace
      - id: check-yaml
      - id: check-json
        exclude: "package-lock.json"
      - id: check-ast

  # ── Forbidden path patterns ────────────────────────────────────
  - repo: local
    hooks:
      - id: no-sensitive-files
        name: Block sensitive file types
        entry: "echo 'Blocked: model weights, PDFs, or database files must not be committed' && false"
        language: system
        files: '\.(pt|pth|onnx|safetensors|gguf|bin|h5|pdf|docx|doc|db|sqlite|sqlite3)$'
        exclude: '(docs/|\.md$)'

      - id: no-upload-artifacts
        name: Block upload/result directories
        entry: "echo 'Blocked: upload or result artifacts must not be committed' && false"
        language: system
        files: '^(data/uploads/|backend/uploads/|results/|debug_outputs/)'

  # ── Python formatting ──────────────────────────────────────────
  - repo: https://github.com/psf/black
    rev: 24.4.2
    hooks:
      - id: black
        args: ["--line-length=120"]

  # ── Python linting ─────────────────────────────────────────────
  - repo: https://github.com/pycqa/flake8
    rev: 7.1.0
    hooks:
      - id: flake8
        args: ["--max-line-length=120", "--ignore=E203,E501,W503"]
