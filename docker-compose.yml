# ═══════════════════════════════════════════════════════════════
# VietIDP — Docker Compose
# ═══════════════════════════════════════════════════════════════
# Canonical Stack: FastAPI + React/Vite + PostgreSQL + Ollama
#
# Usage:
#   Development:  docker compose up -d
#   Production:   docker compose --profile production up -d
#   Stop:         docker compose down
#   GPU:          Requires nvidia-container-toolkit
# ═══════════════════════════════════════════════════════════════

services:
  # ── Backend FastAPI (GPU) ────────────────────────────────────
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: vietidp-backend
    ports:
      - "${BACKEND_PORT:-8000}:8000"
    volumes:
      - ./data:/app/data
      - ./models:/app/models
      - ./results:/app/results
    environment:
      - DATABASE_URL=postgresql://${POSTGRES_USER:-vietidp}:${POSTGRES_PASSWORD:-vietidp}@postgres:5432/${POSTGRES_DB:-vietidp}
      - OLLAMA_URL=http://ollama:11434/api/generate
      - OLLAMA_MODEL=${OLLAMA_MODEL:-qwen2.5:7b}
      - VIETIDP_ENV=${VIETIDP_ENV:-development}
      - VIETIDP_REQUIRE_API_KEY=${VIETIDP_REQUIRE_API_KEY:-false}
      - VIETIDP_API_KEY=${VIETIDP_API_KEY:-}
      - VIETIDP_CORS_ORIGINS=${VIETIDP_CORS_ORIGINS:-http://localhost:3000,http://localhost:5173}
    depends_on:
      postgres:
        condition: service_healthy
      ollama:
        condition: service_started
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    restart: unless-stopped

  # ── Frontend (Nginx) ────────────────────────────────────────
  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
      args:
        VITE_API_URL: ${VITE_API_URL:-}
        VITE_API_KEY: ${VITE_API_KEY:-}
    container_name: vietidp-frontend
    ports:
      - "${FRONTEND_PORT:-3000}:80"
    depends_on:
      - backend
    restart: unless-stopped

  # ── PostgreSQL ──────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: vietidp-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-vietidp}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-vietidp}
      POSTGRES_DB: ${POSTGRES_DB:-vietidp}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    # Do NOT expose Postgres port to host by default (security)
    # Uncomment for local debugging:
    # ports:
    #   - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-vietidp}"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # ── Ollama LLM Server (GPU) ────────────────────────────────
  ollama:
    image: ollama/ollama:latest
    container_name: vietidp-ollama
    # Do NOT expose Ollama port to host by default (security)
    # Uncomment for local debugging:
    # ports:
    #   - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    restart: unless-stopped

  # ── Redis (optional, for durable job queue) ─────────────────
  # Uncomment when durable task processing is implemented:
  # redis:
  #   image: redis:7-alpine
  #   container_name: vietidp-redis
  #   volumes:
  #     - redis_data:/data
  #   healthcheck:
  #     test: ["CMD", "redis-cli", "ping"]
  #     interval: 5s
  #     timeout: 5s
  #     retries: 5
  #   restart: unless-stopped

volumes:
  postgres_data:
  ollama_data:
  # redis_data:  # Uncomment when Redis is enabled
